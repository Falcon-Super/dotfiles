[defaults]
# Path to inventory file
inventory = ./inventory.ini

# Disable host key checking for localhost (safe for local runs)
host_key_checking = False

# Show more details during execution
display_skipped_hosts = False
stdout_callback = yaml

# Disable SSH warnings for local connections
transport = local

[privilege_escalation]
# We don't need sudo for home directory & Homebrew tasks
become = False
